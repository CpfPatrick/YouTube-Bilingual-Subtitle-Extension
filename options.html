<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bilingual Subtitles — Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1f1f1f;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
      margin: 0;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
      padding: 28px 32px;
      width: 100%;
      max-width: 460px;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    p.sub { color: #666; font-size: 13px; margin: 0 0 24px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 16px 0 6px; }
    .keyrow { display: flex; gap: 8px; }
    input[type="text"], input[type="password"] {
      flex: 1;
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      font-family: ui-monospace, Menlo, monospace;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      background: #e8e8e8;
    }
    button.primary { background: #1a73e8; color: #fff; }
    button:disabled { opacity: 0.5; cursor: default; }
    .actions { display: flex; gap: 8px; margin-top: 24px; align-items: center; }
    #status { font-size: 13px; margin-left: 4px; }
    #status.ok { color: #188038; }
    #status.err { color: #d93025; }
    .danger-zone { margin-top: 28px; padding-top: 16px; border-top: 1px solid #eee; }
    .hint { font-size: 12px; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Bilingual Subtitles for YouTube</h1>
    <p class="sub">English + 简体中文 subtitles translated by DeepSeek.</p>

    <label for="apiKey">DeepSeek API key</label>
    <div class="keyrow">
      <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
      <button id="toggleKey" type="button">Show</button>
    </div>
    <div class="hint">Stored only on this device. Get a key at platform.deepseek.com.</div>

    <label for="model">Model</label>
    <input type="text" id="model" placeholder="deepseek-v4-flash">

    <div class="actions">
      <button class="primary" id="save">Save</button>
      <button id="test">Test connection</button>
      <span id="status"></span>
    </div>

    <div class="danger-zone">
      <button id="clearCache">Clear translation cache</button>
      <span id="cacheStatus" class="hint"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
